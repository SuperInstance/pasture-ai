<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="panelGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f0f23"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="500" fill="url(#bgGrad)"/>
  
  <!-- Header -->
  <rect x="10" y="10" width="780" height="40" rx="5" fill="url(#panelGrad)" stroke="#e94560" stroke-width="1"/>
  <text x="20" y="35" font-family="monospace" font-size="14" fill="#fff">🐄 SUPERINSTANCE RANCH - Day 14</text>
  <text x="500" y="35" font-family="monospace" font-size="12" fill="#888">"Not a Superintelligence, but a loyal team that evolves"</text>
  <rect x="720" y="20" width="60" height="20" rx="3" fill="#e94560"/>
  <text x="730" y="34" font-family="monospace" font-size="10" fill="#fff">4.2 MB</text>
  
  <!-- Species Panel -->
  <rect x="10" y="60" width="200" height="280" rx="5" fill="url(#panelGrad)" stroke="#333" stroke-width="1"/>
  <text x="20" y="80" font-family="monospace" font-size="11" fill="#888">SPECIES PANEL</text>
  
  <!-- Species Items with animation -->
  <g>
    <rect x="15" y="95" width="190" height="30" rx="3" fill="#1a2a4a">
      <animate attributeName="fill" values="#1a2a4a;#2a3a5a;#1a2a4a" dur="2s" repeatCount="indefinite"/>
    </rect>
    <text x="25" y="115" font-family="monospace" font-size="12" fill="#fff">🐄 Cattle</text>
    <text x="120" y="115" font-family="monospace" font-size="10" fill="#888">x2</text>
    <rect x="160" y="105" width="40" height="15" rx="2" fill="#4ade80"/>
    <text x="165" y="115" font-family="monospace" font-size="8" fill="#000">ACTIVE</text>
  </g>
  
  <g>
    <rect x="15" y="130" width="190" height="30" rx="3" fill="#1a2a4a"/>
    <text x="25" y="150" font-family="monospace" font-size="12" fill="#fff">🐑 Sheep</text>
    <text x="120" y="150" font-family="monospace" font-size="10" fill="#888">x5</text>
    <rect x="160" y="140" width="40" height="15" rx="2" fill="#4ade80"/>
    <text x="165" y="150" font-family="monospace" font-size="8" fill="#000">ACTIVE</text>
  </g>
  
  <g>
    <rect x="15" y="165" width="190" height="30" rx="3" fill="#1a2a4a"/>
    <text x="25" y="185" font-family="monospace" font-size="12" fill="#fff">🦆 Duck</text>
    <text x="120" y="185" font-family="monospace" font-size="10" fill="#888">x3</text>
    <rect x="160" y="175" width="40" height="15" rx="2" fill="#4ade80"/>
    <text x="165" y="185" font-family="monospace" font-size="8" fill="#000">ACTIVE</text>
  </g>
  
  <g>
    <rect x="15" y="200" width="190" height="30" rx="3" fill="#1a2a4a">
      <animate attributeName="fill" values="#1a2a4a;#2a3a5a;#1a2a4a" dur="3s" repeatCount="indefinite"/>
    </rect>
    <text x="25" y="220" font-family="monospace" font-size="12" fill="#fff">🐐 Goat</text>
    <text x="120" y="220" font-family="monospace" font-size="10" fill="#888">x2</text>
    <rect x="160" y="210" width="40" height="15" rx="2" fill="#4ade80"/>
    <text x="165" y="220" font-family="monospace" font-size="8" fill="#000">ACTIVE</text>
  </g>
  
  <g>
    <rect x="15" y="235" width="190" height="30" rx="3" fill="#1a2a4a"/>
    <text x="25" y="255" font-family="monospace" font-size="12" fill="#fff">🐗 Hog</text>
    <text x="120" y="255" font-family="monospace" font-size="10" fill="#888">x1</text>
    <rect x="160" y="245" width="40" height="15" rx="2" fill="#4ade80"/>
    <text x="165" y="255" font-family="monospace" font-size="8" fill="#000">ACTIVE</text>
  </g>
  
  <g>
    <rect x="15" y="270" width="190" height="30" rx="3" fill="#1a2a4a"/>
    <text x="25" y="290" font-family="monospace" font-size="12" fill="#fff">🐔 Chicken</text>
    <text x="120" y="290" font-family="monospace" font-size="10" fill="#888">x3</text>
    <rect x="160" y="280" width="40" height="15" rx="2" fill="#4ade80"/>
    <text x="165" y="290" font-family="monospace" font-size="8" fill="#000">ACTIVE</text>
  </g>
  
  <g>
    <rect x="15" y="305" width="190" height="30" rx="3" fill="#1a2a4a"/>
    <text x="25" y="325" font-family="monospace" font-size="12" fill="#fff">🐎 Horse</text>
    <text x="120" y="325" font-family="monospace" font-size="10" fill="#888">x1</text>
    <rect x="160" y="315" width="40" height="15" rx="2" fill="#fbbf24"/>
    <text x="168" y="325" font-family="monospace" font-size="8" fill="#000">IDLE</text>
  </g>
  
  <!-- Resource Panel -->
  <rect x="220" y="60" width="200" height="150" rx="5" fill="url(#panelGrad)" stroke="#333" stroke-width="1"/>
  <text x="230" y="80" font-family="monospace" font-size="11" fill="#888">RESOURCES</text>
  
  <!-- GPU Memory Bar -->
  <text x="230" y="100" font-family="monospace" font-size="10" fill="#aaa">GPU Memory</text>
  <rect x="230" y="105" width="180" height="10" rx="2" fill="#1a2a4a"/>
  <rect x="230" y="105" width="108" height="10" rx="2" fill="#4ade80">
    <animate attributeName="width" values="108;115;108" dur="4s" repeatCount="indefinite"/>
  </rect>
  <text x="320" y="100" font-family="monospace" font-size="9" fill="#4ade80">3.2GB / 6.5GB</text>
  
  <!-- CPU Bar -->
  <text x="230" y="130" font-family="monospace" font-size="10" fill="#aaa">CPU</text>
  <rect x="230" y="135" width="180" height="8" rx="2" fill="#1a2a4a"/>
  <rect x="230" y="135" width="54" height="8" rx="2" fill="#60a5fa">
    <animate attributeName="width" values="54;72;54" dur="3s" repeatCount="indefinite"/>
  </rect>
  <text x="320" y="130" font-family="monospace" font-size="9" fill="#60a5fa">28%</text>
  
  <!-- RAM Bar -->
  <text x="230" y="160" font-family="monospace" font-size="10" fill="#aaa">RAM</text>
  <rect x="230" y="165" width="180" height="8" rx="2" fill="#1a2a4a"/>
  <rect x="230" y="165" width="72" height="8" rx="2" fill="#a78bfa"/>
  <text x="320" y="160" font-family="monospace" font-size="9" fill="#a78bfa">3.2GB</text>
  
  <!-- Savings -->
  <rect x="220" y="220" width="200" height="50" rx="5" fill="url(#panelGrad)" stroke="#4ade80" stroke-width="1"/>
  <text x="280" y="245" font-family="monospace" font-size="14" fill="#4ade80" filter="url(#glow)">💰 $127.50 Saved</text>
  <text x="270" y="260" font-family="monospace" font-size="10" fill="#888">255 cloud calls avoided</text>
  
  <!-- Activity Log -->
  <rect x="430" y="60" width="360" height="280" rx="5" fill="url(#panelGrad)" stroke="#333" stroke-width="1"/>
  <text x="440" y="80" font-family="monospace" font-size="11" fill="#888">ACTIVITY LOG</text>
  
  <!-- Activity Items -->
  <g>
    <rect x="435" y="95" width="350" height="25" rx="2" fill="#1a2a4a">
      <animate attributeName="opacity" values="1;0.7;1" dur="1s" repeatCount="indefinite"/>
    </rect>
    <text x="445" y="112" font-family="monospace" font-size="10" fill="#888">10:23</text>
    <text x="485" y="112" font-family="monospace" font-size="10" fill="#fff">🐔 Motion detected (perimeter)</text>
  </g>
  
  <rect x="435" y="125" width="350" height="25" rx="2" fill="#1a2a4a"/>
  <text x="445" y="142" font-family="monospace" font-size="10" fill="#888">10:22</text>
  <text x="485" y="142" font-family="monospace" font-size="10" fill="#fff">🦆 Fetched calendar data</text>
  
  <rect x="435" y="155" width="350" height="25" rx="2" fill="#1a2a4a"/>
  <text x="445" y="172" font-family="monospace" font-size="10" fill="#888">10:20</text>
  <text x="485" y="172" font-family="monospace" font-size="10" fill="#fff">🐑 Consensus: 4 spam, 12 good</text>
  
  <rect x="435" y="185" width="350" height="25" rx="2" fill="#1a2a4a"/>
  <text x="445" y="202" font-family="monospace" font-size="10" fill="#888">10:18</text>
  <text x="485" y="202" font-family="monospace" font-size="10" fill="#fff">🐐 Navigated /var/log/syslog</text>
  
  <rect x="435" y="215" width="350" height="25" rx="2" fill="#1a2a4a"/>
  <text x="445" y="232" font-family="monospace" font-size="10" fill="#888">10:15</text>
  <text x="485" y="232" font-family="monospace" font-size="10" fill="#fff">🐄 Briefing generated</text>
  
  <rect x="435" y="245" width="350" height="25" rx="2" fill="#1a2a4a"/>
  <text x="445" y="262" font-family="monospace" font-size="10" fill="#888">10:10</text>
  <text x="485" y="262" font-family="monospace" font-size="10" fill="#fff">🐔 Heartbeat OK</text>
  
  <!-- Quick Actions -->
  <rect x="10" y="350" width="200" height="140" rx="5" fill="url(#panelGrad)" stroke="#333" stroke-width="1"/>
  <text x="20" y="370" font-family="monospace" font-size="11" fill="#888">QUICK ACTIONS</text>
  
  <rect x="20" y="385" width="180" height="25" rx="3" fill="#1a2a4a" stroke="#4ade80" stroke-width="1"/>
  <text x="30" y="402" font-family="monospace" font-size="10" fill="#4ade80">[D] Morning Routine</text>
  
  <rect x="20" y="415" width="180" height="25" rx="3" fill="#1a2a4a" stroke="#a78bfa" stroke-width="1"/>
  <text x="30" y="432" font-family="monospace" font-size="10" fill="#a78bfa">[N] Night School</text>
  
  <rect x="20" y="445" width="180" height="25" rx="3" fill="#1a2a4a" stroke="#60a5fa" stroke-width="1"/>
  <text x="30" y="462" font-family="monospace" font-size="10" fill="#60a5fa">[B] Create New Breed</text>
  
  <!-- Performance Metrics -->
  <rect x="220" y="280" width="200" height="100" rx="5" fill="url(#panelGrad)" stroke="#e94560" stroke-width="1"/>
  <text x="230" y="300" font-family="monospace" font-size="11" fill="#888">PERFORMANCE</text>
  
  <text x="230" y="325" font-family="monospace" font-size="10" fill="#aaa">Tokens/sec:</text>
  <text x="340" y="325" font-family="monospace" font-size="14" fill="#4ade80" filter="url(#glow)">12.5</text>
  
  <text x="230" y="345" font-family="monospace" font-size="10" fill="#aaa">First Token:</text>
  <text x="340" y="345" font-family="monospace" font-size="14" fill="#4ade80">4.2ms</text>
  
  <text x="230" y="365" font-family="monospace" font-size="10" fill="#aaa">TensorRT-LLM:</text>
  <text x="340" y="365" font-family="monospace" font-size="12" fill="#4ade80">✓ Active</text>
  
  <!-- Night School Status -->
  <rect x="220" y="390" width="200" height="100" rx="5" fill="url(#panelGrad)" stroke="#a78bfa" stroke-width="1"/>
  <text x="230" y="410" font-family="monospace" font-size="11" fill="#a78bfa">🌙 NIGHT SCHOOL</text>
  
  <text x="230" y="435" font-family="monospace" font-size="10" fill="#4ade80">✓ Last run: Today 02:00</text>
  <text x="230" y="455" font-family="monospace" font-size="10" fill="#888">2 breeds culled, 3 created</text>
  <text x="230" y="475" font-family="monospace" font-size="10" fill="#fbbf24">Avg fitness: +4.2%</text>
  
  <!-- Footer -->
  <rect x="430" y="350" width="360" height="90" rx="5" fill="url(#panelGrad)" stroke="#333" stroke-width="1"/>
  <text x="440" y="370" font-family="monospace" font-size="11" fill="#888">SYSTEM STATUS</text>
  
  <circle cx="455" y="395" r="5" fill="#4ade80">
    <animate attributeName="opacity" values="1;0.5;1" dur="1s" repeatCount="indefinite"/>
  </circle>
  <text x="470" y="398" font-family="monospace" font-size="10" fill="#4ade80">Collie Online</text>
  
  <circle cx="455" y="415" r="5" fill="#4ade80"/>
  <text x="470" y="418" font-family="monospace" font-size="10" fill="#4ade80">TensorRT-LLM Ready</text>
  
  <circle cx="455" y="435" r="5" fill="#4ade80"/>
  <text x="470" y="438" font-family="monospace" font-size="10" fill="#4ade80">Memory Pasture: 1.2GB</text>
  
  <!-- Caption -->
  <text x="400" y="490" font-family="monospace" font-size="10" fill="#666" text-anchor="middle">SuperInstance TUI Dashboard - Real-time Ranch Monitoring</text>
</svg>