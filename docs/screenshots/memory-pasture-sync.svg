<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#0f2744"/>
    </linearGradient>
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#22d3ee"/>
    </linearGradient>
    <filter id="glow4">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="500" fill="url(#bgGrad4)"/>
  
  <!-- Title -->
  <text x="400" y="30" font-family="system-ui, sans-serif" font-size="18" font-weight="bold" fill="#f8fafc" text-anchor="middle">🧠 Memory Pasture: CRDT Sync Across Multi-Jetson Ranch</text>
  <text x="400" y="50" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Offline-first • Conflict-free • Eventually Consistent</text>
  
  <!-- Jetson 1 (Office) -->
  <g transform="translate(50, 80)">
    <rect x="0" y="0" width="200" height="150" rx="8" fill="#0f2744" stroke="#06b6d4" stroke-width="2"/>
    <text x="100" y="25" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#22d3ee" text-anchor="middle">🏠 Jetson 1 (Office)</text>
    
    <!-- Species icons -->
    <text x="30" y="55" font-family="system-ui, sans-serif" font-size="16">🐄</text>
    <text x="70" y="55" font-family="system-ui, sans-serif" font-size="16">🦆</text>
    <text x="110" y="55" font-family="system-ui, sans-serif" font-size="16">🐐</text>
    
    <!-- Memory stats -->
    <rect x="15" y="70" width="170" height="70" rx="4" fill="#0a1628"/>
    <text x="100" y="90" font-family="monospace" font-size="9" fill="#94a3b8" text-anchor="middle">Memory: 1.2 GB</text>
    <text x="100" y="105" font-family="monospace" font-size="9" fill="#4ade80" text-anchor="middle">47,832 embeddings</text>
    <text x="100" y="120" font-family="monospace" font-size="9" fill="#06b6d4" text-anchor="middle">RAG latency: 12ms</text>
    <text x="100" y="135" font-family="monospace" font-size="8" fill="#64748b" text-anchor="middle">Last sync: 2s ago</text>
    
    <!-- Status indicator -->
    <circle cx="185" cy="15" r="6" fill="#4ade80">
      <animate attributeName="opacity" values="1;0.5;1" dur="1.5s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Jetson 2 (Garage) -->
  <g transform="translate(300, 80)">
    <rect x="0" y="0" width="200" height="150" rx="8" fill="#0f2744" stroke="#06b6d4" stroke-width="2"/>
    <text x="100" y="25" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#22d3ee" text-anchor="middle">🚗 Jetson 2 (Garage)</text>
    
    <!-- Species icons -->
    <text x="30" y="55" font-family="system-ui, sans-serif" font-size="16">🐗</text>
    <text x="70" y="55" font-family="system-ui, sans-serif" font-size="16">🐐</text>
    <text x="110" y="55" font-family="system-ui, sans-serif" font-size="16">🐔</text>
    
    <!-- Memory stats -->
    <rect x="15" y="70" width="170" height="70" rx="4" fill="#0a1628"/>
    <text x="100" y="90" font-family="monospace" font-size="9" fill="#94a3b8" text-anchor="middle">Memory: 0.8 GB</text>
    <text x="100" y="105" font-family="monospace" font-size="9" fill="#4ade80" text-anchor="middle">31,204 embeddings</text>
    <text x="100" y="120" font-family="monospace" font-size="9" fill="#06b6d4" text-anchor="middle">RAG latency: 15ms</text>
    <text x="100" y="135" font-family="monospace" font-size="8" fill="#64748b" text-anchor="middle">Last sync: 3s ago</text>
    
    <!-- Status indicator -->
    <circle cx="185" cy="15" r="6" fill="#4ade80">
      <animate attributeName="opacity" values="1;0.5;1" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Jetson 3 (Bedroom) -->
  <g transform="translate(550, 80)">
    <rect x="0" y="0" width="200" height="150" rx="8" fill="#0f2744" stroke="#06b6d4" stroke-width="2"/>
    <text x="100" y="25" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#22d3ee" text-anchor="middle">🛏️ Jetson 3 (Bedroom)</text>
    
    <!-- Species icons -->
    <text x="30" y="55" font-family="system-ui, sans-serif" font-size="16">🐔</text>
    <text x="70" y="55" font-family="system-ui, sans-serif" font-size="16">🐑</text>
    <text x="110" y="55" font-family="system-ui, sans-serif" font-size="16">🦆</text>
    
    <!-- Memory stats -->
    <rect x="15" y="70" width="170" height="70" rx="4" fill="#0a1628"/>
    <text x="100" y="90" font-family="monospace" font-size="9" fill="#94a3b8" text-anchor="middle">Memory: 0.6 GB</text>
    <text x="100" y="105" font-family="monospace" font-size="9" fill="#4ade80" text-anchor="middle">23,156 embeddings</text>
    <text x="100" y="120" font-family="monospace" font-size="9" fill="#06b6d4" text-anchor="middle">RAG latency: 18ms</text>
    <text x="100" y="135" font-family="monospace" font-size="8" fill="#64748b" text-anchor="middle">Last sync: 1s ago</text>
    
    <!-- Status indicator -->
    <circle cx="185" cy="15" r="6" fill="#4ade80">
      <animate attributeName="opacity" values="1;0.5;1" dur="1s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- CRDT Sync Network (center) -->
  <g transform="translate(300, 260)">
    <rect x="0" y="0" width="200" height="100" rx="8" fill="#0a1628" stroke="url(#cyanGrad)" stroke-width="2" filter="url(#glow4)"/>
    <text x="100" y="25" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#22d3ee" text-anchor="middle">🔄 CRDT Memory Sync</text>
    <text x="100" y="45" font-family="monospace" font-size="9" fill="#94a3b8" text-anchor="middle">smartcrdt + lucineer</text>
    
    <!-- Sync stats -->
    <text x="100" y="65" font-family="monospace" font-size="8" fill="#4ade80" text-anchor="middle">✓ No server needed</text>
    <text x="100" y="78" font-family="monospace" font-size="8" fill="#4ade80" text-anchor="middle">✓ Offline-first</text>
    <text x="100" y="91" font-family="monospace" font-size="8" fill="#4ade80" text-anchor="middle">✓ Auto-conflict resolution</text>
  </g>
  
  <!-- Sync arrows from Jetsons to CRDT -->
  <!-- Jetson 1 to CRDT -->
  <path d="M150 230 Q200 280 300 310" stroke="#06b6d4" stroke-width="2" fill="none" stroke-dasharray="6,3">
    <animate attributeName="stroke-dashoffset" values="0;-9" dur="0.8s" repeatCount="indefinite"/>
  </path>
  <polygon points="300,310 290,302 295,314" fill="#06b6d4"/>
  
  <!-- Jetson 2 to CRDT (direct) -->
  <path d="M400 230 L400 260" stroke="#06b6d4" stroke-width="2" fill="none" stroke-dasharray="6,3">
    <animate attributeName="stroke-dashoffset" values="0;-9" dur="0.8s" repeatCount="indefinite"/>
  </path>
  <polygon points="400,260 395,250 405,250" fill="#06b6d4"/>
  
  <!-- Jetson 3 to CRDT -->
  <path d="M650 230 Q600 280 500 310" stroke="#06b6d4" stroke-width="2" fill="none" stroke-dasharray="6,3">
    <animate attributeName="stroke-dashoffset" values="0;-9" dur="0.8s" repeatCount="indefinite"/>
  </path>
  <polygon points="500,310 510,302 505,314" fill="#06b6d4"/>
  
  <!-- Cross-sync arrows (P2P) -->
  <path d="M250 155 L300 155" stroke="#22d3ee" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
  <path d="M500 155 L550 155" stroke="#22d3ee" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
  
  <!-- Memory visualization at bottom -->
  <g transform="translate(50, 380)">
    <rect x="0" y="0" width="700" height="80" rx="8" fill="#0f2744" opacity="0.8"/>
    <text x="350" y="20" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="#22d3ee" text-anchor="middle">📊 Unified Memory Pasture</text>
    
    <!-- Memory blocks -->
    <g transform="translate(30, 35)">
      <rect x="0" y="0" width="50" height="30" rx="3" fill="#06b6d4" opacity="0.3"/>
      <text x="25" y="20" font-family="monospace" font-size="7" fill="#22d3ee" text-anchor="middle">Convos</text>
      
      <rect x="60" y="0" width="50" height="30" rx="3" fill="#06b6d4" opacity="0.3"/>
      <text x="85" y="20" font-family="monospace" font-size="7" fill="#22d3ee" text-anchor="middle">Prefs</text>
      
      <rect x="120" y="0" width="50" height="30" rx="3" fill="#06b6d4" opacity="0.3"/>
      <text x="145" y="20" font-family="monospace" font-size="7" fill="#22d3ee" text-anchor="middle">Tasks</text>
      
      <rect x="180" y="0" width="50" height="30" rx="3" fill="#06b6d4" opacity="0.3"/>
      <text x="205" y="20" font-family="monospace" font-size="7" fill="#22d3ee" text-anchor="middle">RAG</text>
      
      <!-- Arrow -->
      <text x="260" y="20" font-family="system-ui, sans-serif" font-size="14" fill="#64748b">→</text>
      
      <rect x="290" y="0" width="350" height="30" rx="3" fill="#052e16" stroke="#4ade80" stroke-width="1"/>
      <text x="465" y="12" font-family="monospace" font-size="8" fill="#4ade80" text-anchor="middle">When one Jetson learns, ALL learn</text>
      <text x="465" y="25" font-family="monospace" font-size="7" fill="#94a3b8" text-anchor="middle">Night School champions propagate automatically across the herd</text>
    </g>
  </g>
  
  <!-- Caption -->
  <text x="400" y="485" font-family="system-ui, sans-serif" font-size="10" fill="#475569" text-anchor="middle">Multi-Jetson CRDT Sync - Distributed Memory Pasture with Automatic Reconciliation</text>
</svg>