<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#334155"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="500" fill="url(#bgGrad2)"/>
  
  <!-- Header Bar -->
  <rect x="0" y="0" width="800" height="60" fill="#0f172a" opacity="0.8"/>
  <text x="20" y="38" font-family="system-ui, sans-serif" font-size="20" font-weight="bold" fill="#f8fafc">🐄 SuperInstance Ranch</text>
  <text x="250" y="38" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8">Setup Wizard • Day 1</text>
  
  <!-- Connection Status -->
  <circle cx="750" cy="30" r="8" fill="#4ade80">
    <animate attributeName="opacity" values="1;0.5;1" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <text x="710" y="35" font-family="system-ui, sans-serif" font-size="11" fill="#4ade80">Online</text>
  
  <!-- Main Card -->
  <rect x="50" y="80" width="700" height="380" rx="12" fill="url(#cardGrad)" filter="url(#shadow)"/>
  
  <!-- Progress Steps -->
  <g>
    <!-- Step 1 - Complete -->
    <circle cx="150" cy="120" r="20" fill="#4ade80"/>
    <text x="143" y="126" font-family="system-ui, sans-serif" font-size="14" fill="#0f172a">✓</text>
    <text x="120" y="155" font-family="system-ui, sans-serif" font-size="10" fill="#94a3b8">Hardware</text>
    
    <!-- Connector -->
    <rect x="170" y="118" width="80" height="4" fill="#4ade80"/>
    
    <!-- Step 2 - Complete -->
    <circle cx="270" cy="120" r="20" fill="#4ade80"/>
    <text x="263" y="126" font-family="system-ui, sans-serif" font-size="14" fill="#0f172a">✓</text>
    <text x="240" y="155" font-family="system-ui, sans-serif" font-size="10" fill="#94a3b8">Model</text>
    
    <!-- Connector -->
    <rect x="290" y="118" width="80" height="4" fill="#4ade80"/>
    
    <!-- Step 3 - Current -->
    <circle cx="390" cy="120" r="20" fill="#3b82f6">
      <animate attributeName="r" values="20;22;20" dur="1s" repeatCount="indefinite"/>
    </circle>
    <text x="385" y="126" font-family="system-ui, sans-serif" font-size="12" fill="#fff">3</text>
    <text x="365" y="155" font-family="system-ui, sans-serif" font-size="10" fill="#3b82f6">Breed</text>
    
    <!-- Connector -->
    <rect x="410" y="118" width="80" height="4" fill="#334155"/>
    
    <!-- Step 4 - Pending -->
    <circle cx="510" cy="120" r="20" fill="#334155"/>
    <text x="505" y="126" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">4</text>
    <text x="485" y="155" font-family="system-ui, sans-serif" font-size="10" fill="#64748b">Channels</text>
    
    <!-- Connector -->
    <rect x="530" y="118" width="80" height="4" fill="#334155"/>
    
    <!-- Step 5 - Pending -->
    <circle cx="630" cy="120" r="20" fill="#334155"/>
    <text x="625" y="126" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">5</text>
    <text x="610" y="155" font-family="system-ui, sans-serif" font-size="10" fill="#64748b">Done</text>
  </g>
  
  <!-- Title -->
  <text x="100" y="200" font-family="system-ui, sans-serif" font-size="24" font-weight="bold" fill="#f8fafc">Choose Your First Breed</text>
  <text x="100" y="225" font-family="system-ui, sans-serif" font-size="13" fill="#94a3b8">Select a template to customize your first AI agent</text>
  
  <!-- Template Cards -->
  <!-- Card 1 - Email Cow -->
  <g>
    <rect x="100" y="250" width="180" height="120" rx="8" fill="#1e293b" stroke="#4ade80" stroke-width="2">
      <animate attributeName="stroke-opacity" values="1;0.5;1" dur="2s" repeatCount="indefinite"/>
    </rect>
    <text x="190" y="285" font-family="system-ui, sans-serif" font-size="28" text-anchor="middle">🐄</text>
    <text x="190" y="310" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#f8fafc" text-anchor="middle">Email Triage Cow</text>
    <text x="190" y="330" font-family="system-ui, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">Sort, prioritize, respond</text>
    <text x="190" y="355" font-family="system-ui, sans-serif" font-size="9" fill="#4ade80" text-anchor="middle">Recommended</text>
  </g>
  
  <!-- Card 2 - Calendar Duck -->
  <g>
    <rect x="300" y="250" width="180" height="120" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="390" y="285" font-family="system-ui, sans-serif" font-size="28" text-anchor="middle">🦆</text>
    <text x="390" y="310" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#f8fafc" text-anchor="middle">Calendar Duck</text>
    <text x="390" y="330" font-family="system-ui, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">Schedule, remind, sync</text>
  </g>
  
  <!-- Card 3 - Code Goat -->
  <g>
    <rect x="500" y="250" width="180" height="120" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="590" y="285" font-family="system-ui, sans-serif" font-size="28" text-anchor="middle">🐐</text>
    <text x="590" y="310" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#f8fafc" text-anchor="middle">Code Navigator</text>
    <text x="590" y="330" font-family="system-ui, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">Search, explain, debug</text>
  </g>
  
  <!-- Breed Preview Section -->
  <rect x="100" y="390" width="580" height="60" rx="6" fill="#0f172a"/>
  <text x="120" y="415" font-family="monospace" font-size="11" fill="#4ade80"># breed.md preview</text>
  <text x="120" y="435" font-family="monospace" font-size="10" fill="#94a3b8">| Gene Trait | Weight | Description |</text>
  <text x="380" y="435" font-family="monospace" font-size="10" fill="#64748b">| polite_tone | 0.8 | Professional style |</text>
  
  <!-- Action Buttons -->
  <rect x="700" y="390" width="80" height="35" rx="6" fill="#3b82f6"/>
  <text x="740" y="412" font-family="system-ui, sans-serif" font-size="12" fill="#fff" text-anchor="middle">Next →</text>
  
  <rect x="700" y="435" width="80" height="25" rx="6" fill="#334155"/>
  <text x="740" y="452" font-family="system-ui, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">Skip</text>
  
  <!-- Keyboard Shortcut Hint -->
  <text x="100" y="470" font-family="system-ui, sans-serif" font-size="10" fill="#64748b">Press 1-3 to select • Enter to continue • Esc to go back</text>
  
  <!-- Caption -->
  <text x="400" y="490" font-family="system-ui, sans-serif" font-size="10" fill="#475569" text-anchor="middle">Dioxus Web Onboarding - Zero Node.js, Single Binary Dashboard</text>
</svg>